<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Demographics</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="container">
    <h1>Background Questions</h1>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post">
      <label>Age</label>
      <input name="age" type="number" min="18" max="120" step="1" required>

      <label>Gender</label>
      <select name="gender" required>
        <option value="" selected disabled>Choose...</option>
        {% for g in genders %}
          <option value="{{ g }}">{{ g }}</option>
        {% endfor %}
      </select>

      <label>Region you grew up in</label>
      <select name="grew_up_region" required>
        <option value="" selected disabled>Choose...</option>
        {% for r in regions %}
          <option value="{{ r }}">{{ r }}</option>
        {% endfor %}
      </select>

      <label>If United States, which state?</label>
      <select name="grew_up_state" required>
        <option value="" selected disabled>Choose...</option>
        {% for s in us_states %}
          <option value="{{ s }}">{{ s }}</option>
        {% endfor %}
      </select>

      <label>Native language</label>
      <input name="native_language" required>

      <button class="btn" type="submit">Continue</button>
    </form>
  </div>
</body>
</html>
