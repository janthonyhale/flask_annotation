<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>Video Emotion Annotation</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/app.css') }}">
</head>
<body>
  <div class="container">
    <h1>Video Emotion Annotation</h1>
    <p>You will watch a customer-service dispute between a buyer and seller (split-screen).
       You will see both people, but you must rate emotions only for the highlighted person.</p>

    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}

    <form method="post" action="{{ url_for('start') }}">
      <input type="hidden" name="t" value="{{ t_value or '' }}">

      <label for="participant_id">Unique ID</label>
      <input id="participant_id" name="participant_id" required
             placeholder="Enter your unique participant ID" value="{{ prefill_id or '' }}">

      <button class="btn" type="submit">Start</button>
    </form>
  </div>
</body>
</html>
